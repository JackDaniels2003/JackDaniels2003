<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 1200 340" fill="none" role="img" aria-label="Daniel Teodoro — Software Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="52%" stop-color="#0B1222"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="50%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#60A5FA"/>
      <animate attributeName="x1" values="-1;0;-1" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;1;0" dur="9s" repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="spot" cx="50%" cy="-5%" r="80%">
      <stop offset="0%" stop-color="#1E3A8A" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1E3A8A" stroke-opacity="0.16" stroke-width="1"/>
    </pattern>

    <linearGradient id="underline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0"/>
      <stop offset="50%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </linearGradient>

    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="frame">
      <rect width="1200" height="340" rx="0"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="340" fill="url(#bg)"/>
    <rect width="1200" height="340" fill="url(#grid)"/>
    <rect width="1200" height="340" fill="url(#spot)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="7s" repeatCount="indefinite"/>
    </rect>

    <!-- sweeping vertical light lines -->
    <g opacity="0.5">
      <g>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="200 0" dur="11s" repeatCount="indefinite"/>
        <line x1="-200" y1="0" x2="-200" y2="340" stroke="#2563EB" stroke-opacity="0.14"/>
        <line x1="0"    y1="0" x2="0"    y2="340" stroke="#2563EB" stroke-opacity="0.14"/>
        <line x1="200"  y1="0" x2="200"  y2="340" stroke="#2563EB" stroke-opacity="0.14"/>
        <line x1="400"  y1="0" x2="400"  y2="340" stroke="#2563EB" stroke-opacity="0.14"/>
        <line x1="600"  y1="0" x2="600"  y2="340" stroke="#2563EB" stroke-opacity="0.14"/>
        <line x1="800"  y1="0" x2="800"  y2="340" stroke="#2563EB" stroke-opacity="0.14"/>
        <line x1="1000" y1="0" x2="1000" y2="340" stroke="#2563EB" stroke-opacity="0.14"/>
        <line x1="1200" y1="0" x2="1200" y2="340" stroke="#2563EB" stroke-opacity="0.14"/>
      </g>
    </g>

    <!-- floating particles -->
    <g fill="#60A5FA">
      <circle cx="180" cy="90" r="1.6" opacity="0.6">
        <animate attributeName="opacity" values="0.1;0.8;0.1" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1010" cy="70" r="1.6" opacity="0.5">
        <animate attributeName="opacity" values="0.8;0.1;0.8" dur="6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="250" cy="270" r="1.4" opacity="0.5">
        <animate attributeName="opacity" values="0.2;0.7;0.2" dur="4.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="950" cy="280" r="1.4" opacity="0.5">
        <animate attributeName="opacity" values="0.7;0.2;0.7" dur="5.5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- top hairline -->
    <rect x="0" y="0" width="1200" height="2" fill="url(#accent)" opacity="0.8"/>

    <!-- name -->
    <g filter="url(#soft)">
      <text x="600" y="172" text-anchor="middle"
            font-family="'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="66" font-weight="700" letter-spacing="8" fill="#F8FAFC">DANIEL TEODORO</text>
    </g>

    <!-- subtitle -->
    <text x="600" y="212" text-anchor="middle"
          font-family="'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="17.5" font-weight="600" letter-spacing="6.5" fill="url(#accent)">SOFTWARE ENGINEER &#160;·&#160; BUSINESS SYSTEMS &#160;·&#160; FINANCIAL TECHNOLOGY</text>

    <!-- animated underline -->
    <rect y="236" height="2" rx="1" fill="url(#underline)">
      <animate attributeName="x"     values="600;400;600" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="width" values="0;400;0"     dur="6s" repeatCount="indefinite"/>
    </rect>

    <!-- corner ticks -->
    <g stroke="#2563EB" stroke-width="2" opacity="0.7">
      <path d="M28 28 H64" /><path d="M28 28 V64" />
      <path d="M1172 28 H1136" /><path d="M1172 28 V64" />
      <path d="M28 312 H64" /><path d="M28 312 V276" />
      <path d="M1172 312 H1136" /><path d="M1172 312 V276" />
    </g>
  </g>
</svg>
