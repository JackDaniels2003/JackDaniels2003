<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 760 320" fill="none" role="img" aria-label="terminal">
  <defs>
    <linearGradient id="tbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1222"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="tbar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="tglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- window -->
  <rect x="1" y="1" width="758" height="318" rx="14" fill="url(#tbg)" stroke="#1E3A8A" stroke-opacity="0.5"/>
  <!-- title bar -->
  <path d="M1 15 A14 14 0 0 1 15 1 H745 A14 14 0 0 1 759 15 V44 H1 Z" fill="url(#tbar)"/>
  <circle cx="28" cy="22.5" r="5.5" fill="#1E293B" stroke="#334155"/>
  <circle cx="48" cy="22.5" r="5.5" fill="#1E293B" stroke="#334155"/>
  <circle cx="68" cy="22.5" r="5.5" fill="#1E293B" stroke="#334155"/>
  <text x="380" y="27" text-anchor="middle" font-family="'SF Mono','Cascadia Code',monospace" font-size="12.5" fill="#475569" letter-spacing="1">daniel@production — zsh</text>
  <line x1="1" y1="44" x2="759" y2="44" stroke="#1E3A8A" stroke-opacity="0.4"/>

  <g font-family="'SF Mono','Cascadia Code','Courier New',monospace" font-size="14.5" filter="url(#tglow)">
    <!-- line 1 -->
    <text x="28" y="84" fill="#3B82F6">$ <tspan fill="#E2E8F0">whoami</tspan></text>
    <text x="28" y="108" fill="#64748B" opacity="0">daniel teodoro · software engineer
      <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.1s" fill="freeze"/>
    </text>

    <!-- line 2 -->
    <text x="28" y="144" fill="#3B82F6" opacity="0">$ <tspan fill="#E2E8F0">cat focus.txt</tspan>
      <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.1s" fill="freeze"/>
    </text>
    <text x="28" y="168" fill="#94A3B8" opacity="0">financial systems · business intelligence · automation
      <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.1s" fill="freeze"/>
    </text>

    <!-- line 3 -->
    <text x="28" y="204" fill="#3B82F6" opacity="0">$ <tspan fill="#E2E8F0">status --systems</tspan>
      <animate attributeName="opacity" from="0" to="1" begin="2.4s" dur="0.1s" fill="freeze"/>
    </text>
    <text x="28" y="228" fill="#22D3A7" opacity="0">● running in production · 4 platforms · daily use
      <animate attributeName="opacity" from="0" to="1" begin="3s" dur="0.1s" fill="freeze"/>
    </text>

    <!-- prompt + cursor -->
    <text x="28" y="268" fill="#3B82F6" opacity="0">$ <tspan fill="#E2E8F0">_</tspan>
      <animate attributeName="opacity" from="0" to="1" begin="3.6s" dur="0.1s" fill="freeze"/>
    </text>
    <rect x="44" y="256" width="9" height="16" fill="#60A5FA" opacity="0">
      <animate attributeName="opacity" values="0;0;1;0;1;0;1" keyTimes="0;0.45;0.5;0.6;0.7;0.8;1" dur="6s" begin="3.6s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
