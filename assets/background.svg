<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 1200 400" fill="none" role="img" aria-label="background">
  <defs>
    <linearGradient id="gbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#0B1222"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#1E3A8A" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1E3A8A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="82%" cy="70%" r="42%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1E3A8A" fill-opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="1200" height="400" fill="url(#gbg)"/>
  <rect width="1200" height="400" fill="url(#dots)"/>
  <rect width="1200" height="400" fill="url(#glow1)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="9s" repeatCount="indefinite"/>
  </rect>
  <rect width="1200" height="400" fill="url(#glow2)">
    <animate attributeName="opacity" values="1;0.6;1" dur="11s" repeatCount="indefinite"/>
  </rect>

  <!-- thin geometric lines -->
  <g stroke="#2563EB" stroke-opacity="0.12">
    <path d="M0 80 L1200 200"/>
    <path d="M0 200 L1200 60"/>
    <path d="M0 340 L1200 240"/>
  </g>
</svg>
