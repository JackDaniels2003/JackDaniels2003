name: Generate Snake Animation

on:
  # Re-render once a day so the snake stays current
  schedule:
    - cron: "0 3 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # And on every push to the default branch
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          # Output files written into ./dist
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#3B82F6&color_dots=#0F172A,#1E3A8A,#2563EB,#3B82F6,#60A5FA
            dist/github-snake.svg?palette=github-dark&color_snake=#60A5FA&color_dots=#0F172A,#1E3A8A,#2563EB,#3B82F6,#60A5FA

      - name: Publish to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
